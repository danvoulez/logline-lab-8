{
  "source_kind": "profile_manifest_blueprint",
  "profile_version": 1,
  "profile": {
    "id": "supabase",
    "name": "Supabase Online Spine",
    "kind": "online_spine_profile"
  },
  "authority": {
    "official_spine_declared": true,
    "universal_canon": false,
    "requires_configuration": true
  },
  "capabilities": {
    "remote_spine": "implemented_when_configured",
    "act_validation": true,
    "candidate_capture": true,
    "local_lab_home": true,
    "supabase_ingest": "implemented_when_configured",
    "supabase_env_verification": true,
    "evidence_registry": "unimplemented",
    "receipt_closure": "unimplemented"
  },
  "connection_modes": {
    "preferred": {
      "name": "direct-postgres",
      "required_env": [
        "DATABASE_URL"
      ]
    },
    "fallback": {
      "name": "compatible-rest-rpc",
      "required_env_any": [
        [
          "SUPABASE_URL",
          "SUPABASE_SERVICE_ROLE_KEY"
        ],
        [
          "SUPABASE_URL",
          "SUPABASE_SECRET_KEY"
        ]
      ]
    }
  },
  "required_env": [
    "DATABASE_URL"
  ],
  "unavailable_capabilities": [
    "evidence_registry",
    "receipt_closure"
  ],
  "default_ghosts": [
    "supabase-ingest-unconfigured",
    "supabase-env-unconfigured",
    "remote-spine-unconfigured"
  ]
}
