binary: logline-lab
commands:
  - logline-lab --version
  - logline-lab --help
  - logline-lab setup --help
  - logline-lab setup
  - logline-lab serve --help
  - logline-lab supabase check
  - logline-lab init --help
  - logline-lab init
  - logline-lab doctor
  - logline-lab status
  - logline-lab candidate add --file <path>
  - logline-lab candidate list
  - logline-lab candidate get <candidate_id>
  - logline-lab act validate
  - logline-lab act emit --file <path>
  - logline-lab act emit --file <path> --remote
  - logline-lab ghost list
  - logline-lab projection list
  - logline-lab projection generate local-summary
  - logline-lab report generate daily-state
  - logline-lab lab
  - logline-lab chat
